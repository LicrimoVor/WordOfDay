<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

        <title>Word of Day — живое облако слов для мероприятий</title>
        <meta
            name="description"
            content="Создавайте интерактивные комнаты, собирайте ответы участников и показывайте живое облако слов на общем экране."
        />
        <meta
            name="keywords"
            content="облако слов, интерактив, мероприятие, опрос, обратная связь, Word of Day"
        />
        <meta name="author" content="Word of Day" />
        <meta name="application-name" content="Word of Day" />
        <meta name="robots" content="index, follow, max-image-preview:large" />
        <meta name="googlebot" content="index, follow, max-image-preview:large" />
        <meta name="referrer" content="strict-origin-when-cross-origin" />
        <meta name="format-detection" content="telephone=no" />
        <meta name="color-scheme" content="light" />

        <link id="canonical-url" rel="canonical" href="%BASE_URL%main" />
        <link rel="icon" href="%BASE_URL%favicon.ico" sizes="any" />
        <link rel="shortcut icon" href="%BASE_URL%favicon.ico" />
        <link rel="apple-touch-icon" href="%BASE_URL%logo.ico" />
        <link rel="manifest" href="%BASE_URL%manifest.json" />

        <meta name="theme-color" content="#1c7c54" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <meta name="apple-mobile-web-app-title" content="Word of Day" />

        <meta property="og:type" content="website" />
        <meta property="og:locale" content="ru_RU" />
        <meta property="og:site_name" content="Word of Day" />
        <meta property="og:title" content="Word of Day — живое облако слов" />
        <meta
            property="og:description"
            content="Интерактивные комнаты для сбора ответов и живого облака слов на мероприятиях."
        />
        <meta id="open-graph-url" property="og:url" content="%BASE_URL%main" />
        <meta id="open-graph-image" property="og:image" content="%BASE_URL%logo.ico" />
        <meta property="og:image:alt" content="Логотип Word of Day" />

        <meta name="twitter:card" content="summary" />
        <meta name="twitter:title" content="Word of Day — живое облако слов" />
        <meta
            name="twitter:description"
            content="Интерактивные комнаты для сбора ответов и живого облака слов на мероприятиях."
        />
        <meta id="twitter-image" name="twitter:image" content="%BASE_URL%logo.ico" />
        <meta name="twitter:image:alt" content="Логотип Word of Day" />

        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "WebApplication",
                "name": "Word of Day",
                "alternateName": "Слово дня",
                "description": "Интерактивные комнаты для сбора ответов и показа живого облака слов.",
                "applicationCategory": "EducationalApplication",
                "operatingSystem": "Любая",
                "inLanguage": "ru-RU"
            }
        </script>

        <style>
            html,
            body,
            #root {
                min-height: 100%;
                margin: 0;
            }

            .app-loader {
                min-height: 100vh;
                display: grid;
                place-items: center;
                box-sizing: border-box;
                padding: 24px;
                color: #17221d;
                background:
                    radial-gradient(circle at 78% 22%, rgba(28, 124, 84, 0.12), transparent 28%),
                    radial-gradient(circle at 18% 82%, rgba(161, 92, 26, 0.1), transparent 25%),
                    #f7fbf8;
                font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            }

            .app-loader__content {
                display: grid;
                justify-items: center;
                gap: 18px;
                text-align: center;
            }

            .app-loader__mark {
                position: relative;
                width: 78px;
                height: 78px;
            }

            .app-loader__ring {
                position: absolute;
                inset: 0;
                border: 5px solid rgba(28, 124, 84, 0.14);
                border-top-color: #1c7c54;
                border-radius: 50%;
                animation: app-loader-spin 0.9s linear infinite;
            }

            .app-loader__letter {
                position: absolute;
                inset: 10px;
                display: grid;
                place-items: center;
                border-radius: 50%;
                color: #fff;
                background: #1c7c54;
                font-size: 27px;
                font-weight: 900;
            }

            .app-loader__title {
                margin: 0;
                font-size: 22px;
                font-weight: 900;
            }

            .app-loader__text {
                margin: -10px 0 0;
                color: #63726c;
                font-size: 14px;
            }

            .no-js {
                min-height: 100vh;
                display: grid;
                place-items: center;
                box-sizing: border-box;
                padding: 24px;
                color: #17221d;
                background: #f7fbf8;
                font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                text-align: center;
            }

            .no-js h1 {
                margin: 0 0 12px;
            }

            .no-js p {
                max-width: 520px;
                margin: 0;
                color: #52615b;
                line-height: 1.5;
            }

            @keyframes app-loader-spin {
                to {
                    transform: rotate(360deg);
                }
            }

            @media (prefers-reduced-motion: reduce) {
                .app-loader__ring {
                    animation: none;
                    border-color: #1c7c54;
                }
            }
        </style>

        <script>
            (() => {
                const makeAbsolute = (value) => new URL(value, window.location.origin).href;
                const canonical = document.getElementById('canonical-url');
                const absoluteCanonical = makeAbsolute(canonical.getAttribute('href'));
                canonical.setAttribute('href', absoluteCanonical);
                document.getElementById('open-graph-url').setAttribute('content', absoluteCanonical);

                ['open-graph-image', 'twitter-image'].forEach((id) => {
                    const element = document.getElementById(id);
                    element.setAttribute('content', makeAbsolute(element.getAttribute('content')));
                });
            })();
        </script>
    </head>
    <body>
        <div id="root">
            <div class="app-loader" role="status" aria-live="polite" aria-label="Приложение загружается">
                <div class="app-loader__content">
                    <div class="app-loader__mark" aria-hidden="true">
                        <span class="app-loader__ring"></span>
                        <span class="app-loader__letter">W</span>
                    </div>
                    <p class="app-loader__title">Word of Day</p>
                    <p class="app-loader__text">Загружаем облако слов…</p>
                </div>
            </div>
            <noscript>
                <style>
                    .app-loader {
                        display: none;
                    }
                </style>
                <main class="no-js">
                    <div>
                        <h1>Нужен JavaScript</h1>
                        <p>Включите JavaScript в настройках браузера, чтобы создавать комнаты и работать с облаком слов.</p>
                    </div>
                </main>
            </noscript>
        </div>
        <script type="module" src="/src/index.tsx"></script>
    </body>
</html>
